{% with url_name=request.resolver_match.url_name %}
<div class="admin-sidebar">
    <div class="sidebar-header">
        <h3><i class="fas fa-user-shield"></i> Admin Panel</h3>
    </div>
    <ul class="sidebar-menu">
        <li><a href="{% url 'panel:dashboard' %}" {% if url_name == 'dashboard' %}class="active"{% endif %}><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
        <li><a href="{% url 'panel:products' %}" {% if url_name == 'products' or url_name == 'product_add' or url_name == 'product_edit' or url_name == 'product_delete' %}class="active"{% endif %}><i class="fas fa-box"></i> Products</a></li>
        <li><a href="{% url 'panel:orders' %}" {% if url_name == 'orders' or url_name == 'order_status' %}class="active"{% endif %}><i class="fas fa-shopping-cart"></i> Orders</a></li>
        <li><a href="{% url 'panel:users' %}" {% if url_name == 'users' %}class="active"{% endif %}><i class="fas fa-users"></i> Users</a></li>
        <li class="separator"></li>
        <li><a href="{% url 'catalog:home' %}"><i class="fas fa-home"></i> Back to Site</a></li>
    </ul>
</div>
{% endwith %}
